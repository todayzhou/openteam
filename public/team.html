<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenTeam</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #070b14;
        --panel: rgba(15, 23, 42, 0.88);
        --panel-strong: #111827;
        --panel-soft: rgba(30, 41, 59, 0.72);
        --border: rgba(148, 163, 184, 0.18);
        --border-strong: rgba(148, 163, 184, 0.34);
        --text: #e5edf8;
        --muted: #94a3b8;
        --subtle: #64748b;
        --brand: #7c3aed;
        --brand-2: #06b6d4;
        --danger: #fb7185;
        --warning: #fbbf24;
        --success: #34d399;
        --bubble-user: rgba(124, 58, 237, 0.22);
        --bubble-assistant: rgba(15, 23, 42, 0.98);
        --shadow: 0 24px 70px rgba(0, 0, 0, 0.35);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 1080px;
        min-height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: Inter, ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        border: 0;
      }

      .app-shell {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 2;
        display: grid;
        width: min(1280px, calc(100vw - 32px));
        height: min(860px, calc(100vh - 32px));
        grid-template-columns: minmax(240px, 292px) minmax(420px, 1fr) minmax(320px, 380px);
        padding: 14px;
        gap: 14px;
        transform: translate(-50%, -50%);
        pointer-events: none;
      }

      .app-shell.minimized {
        display: block;
        width: 284px;
        height: auto;
        padding: 0;
      }

      .app-shell.minimized .panel {
        display: none;
      }

      .floating-toolbar {
        position: absolute;
        left: 50%;
        top: -44px;
        z-index: 3;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        min-width: 260px;
        border: 1px solid var(--border-strong);
        border-radius: 999px;
        padding: 7px 8px 7px 14px;
        background: rgba(15, 23, 42, 0.9);
        box-shadow: var(--shadow);
        transform: translateX(-50%);
        backdrop-filter: blur(18px);
        pointer-events: auto;
      }

      .app-shell.minimized .floating-toolbar {
        position: static;
        transform: none;
      }

      .drag-handle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        color: var(--text);
        cursor: grab;
        user-select: none;
        font-size: 12px;
        font-weight: 800;
      }

      .drag-handle:active,
      .app-shell.dragging .drag-handle {
        cursor: grabbing;
      }

      .drag-handle::before {
        content: "";
        width: 9px;
        height: 9px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        box-shadow: 0 0 18px rgba(124, 58, 237, 0.45);
      }

      .panel {
        min-height: 0;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: 22px;
        background: rgba(15, 23, 42, 0.86);
        box-shadow: var(--shadow);
        backdrop-filter: blur(18px);
        pointer-events: auto;
      }

      .sidebar,
      .role-panel {
        display: flex;
        flex-direction: column;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px;
        border-bottom: 1px solid var(--border);
      }

      .brand-mark {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .logo-dot {
        width: 34px;
        height: 34px;
        border-radius: 12px;
        background: linear-gradient(135deg, var(--brand), var(--brand-2));
        box-shadow: 0 0 28px rgba(124, 58, 237, 0.42);
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 16px;
        line-height: 1.1;
      }

      h2 {
        font-size: 15px;
      }

      h3 {
        font-size: 13px;
      }

      .muted {
        color: var(--muted);
      }

      .tiny {
        color: var(--subtle);
        font-size: 11px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 34px;
        border-radius: 11px;
        padding: 0 12px;
        background: rgba(148, 163, 184, 0.13);
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        font-weight: 700;
        transition: 0.16s ease;
      }

      .btn:hover:not(:disabled) {
        background: rgba(148, 163, 184, 0.2);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--brand), #2563eb);
        color: white;
      }

      .btn-primary:hover:not(:disabled) {
        filter: brightness(1.08);
      }

      .btn-danger {
        background: rgba(251, 113, 133, 0.13);
        color: #fecdd3;
      }

      .btn-ghost {
        background: transparent;
        color: var(--muted);
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .chat-create {
        display: grid;
        gap: 10px;
        padding: 14px 16px;
        border-bottom: 1px solid var(--border);
      }

      .field,
      .template-grid {
        display: grid;
        gap: 7px;
      }

      label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid var(--border);
        border-radius: 12px;
        background: rgba(2, 6, 23, 0.58);
        color: var(--text);
        outline: none;
      }

      input,
      select {
        height: 36px;
        padding: 0 11px;
      }

      textarea {
        min-height: 78px;
        resize: vertical;
        padding: 10px 11px;
        line-height: 1.5;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: rgba(124, 58, 237, 0.65);
        box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.13);
      }

      .chat-list {
        display: flex;
        min-height: 0;
        flex: 1;
        flex-direction: column;
        gap: 8px;
        overflow: auto;
        padding: 12px;
      }

      .chat-item {
        width: 100%;
        border: 1px solid transparent;
        border-radius: 16px;
        padding: 12px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        text-align: left;
      }

      .chat-item:hover,
      .chat-item.active {
        border-color: var(--border-strong);
        background: rgba(148, 163, 184, 0.1);
      }

      .chat-row,
      .message-meta,
      .role-row,
      .template-actions,
      .composer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .chat-name,
      .role-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 800;
      }

      .summary-line {
        display: -webkit-box;
        overflow: hidden;
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        -webkit-box-orient: vertical;
        -webkit-line-clamp: 2;
      }

      .status-pill,
      .mention-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        width: fit-content;
        border: 1px solid var(--border);
        border-radius: 999px;
        padding: 3px 8px;
        background: rgba(148, 163, 184, 0.1);
        color: var(--muted);
        font-size: 11px;
        font-weight: 800;
      }

      .status-ready {
        color: var(--success);
      }

      .status-thinking,
      .status-running,
      .status-loading,
      .status-initializing {
        color: var(--warning);
      }

      .status-error {
        color: var(--danger);
      }

      .workspace {
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--border);
      }

      .chat-title-block {
        min-width: 0;
      }

      .chat-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 20px;
      }

      .chat-subtitle {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
      }

      .messages {
        display: flex;
        min-height: 0;
        flex-direction: column;
        gap: 13px;
        overflow: auto;
        padding: 18px 20px;
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: 100%;
        color: var(--muted);
        text-align: center;
      }

      .empty-card {
        max-width: 420px;
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 24px;
        background: rgba(15, 23, 42, 0.55);
      }

      .message {
        max-width: min(760px, 88%);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px 13px;
        background: var(--bubble-assistant);
      }

      .message.user {
        align-self: flex-end;
        background: var(--bubble-user);
      }

      .message.system {
        align-self: center;
        max-width: 72%;
        background: rgba(251, 191, 36, 0.1);
        color: #fde68a;
      }

      .message-body {
        margin-top: 7px;
        white-space: pre-wrap;
        word-break: break-word;
        line-height: 1.58;
      }

      .reference-box {
        margin-top: 8px;
        border-left: 3px solid var(--brand-2);
        border-radius: 10px;
        padding: 8px 10px;
        background: rgba(6, 182, 212, 0.08);
        color: #bae6fd;
        font-size: 12px;
      }

      .message-tools {
        display: flex;
        justify-content: flex-end;
        margin-top: 8px;
      }

      .composer {
        position: relative;
        display: grid;
        gap: 10px;
        padding: 14px 16px 16px;
        border-top: 1px solid var(--border);
        background: rgba(15, 23, 42, 0.7);
      }

      .reference-draft {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid rgba(6, 182, 212, 0.25);
        border-radius: 14px;
        padding: 10px 12px;
        background: rgba(6, 182, 212, 0.08);
      }

      .mention-panel {
        position: absolute;
        right: 16px;
        bottom: 132px;
        z-index: 2;
        width: 240px;
        max-height: 260px;
        overflow: auto;
        border: 1px solid var(--border-strong);
        border-radius: 16px;
        background: #0f172a;
        box-shadow: var(--shadow);
      }

      .mention-option {
        display: block;
        width: 100%;
        border-radius: 0;
        padding: 10px 12px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        text-align: left;
      }

      .mention-option:hover,
      .mention-option.active {
        background: rgba(124, 58, 237, 0.2);
      }

      .role-list,
      .template-list {
        display: grid;
        gap: 8px;
      }

      .role-scroll {
        min-height: 0;
        overflow: auto;
        padding: 14px;
      }

      .role-card,
      .template-card,
      .editor-card {
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 12px;
        background: rgba(2, 6, 23, 0.34);
      }

      .role-card {
        cursor: pointer;
      }

      .role-card.active,
      .template-card.active {
        border-color: rgba(124, 58, 237, 0.55);
        background: rgba(124, 58, 237, 0.12);
      }

      .role-description,
      .template-description {
        margin-top: 6px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .role-editor {
        display: grid;
        gap: 12px;
        margin-top: 14px;
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 16px 0 8px;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 10;
        max-width: 460px;
        border: 1px solid rgba(251, 113, 133, 0.36);
        border-radius: 16px;
        padding: 12px 14px;
        background: #33111b;
        color: #fecdd3;
        box-shadow: var(--shadow);
      }

      #iframe-host {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(420px, 1fr));
        grid-auto-rows: minmax(360px, 1fr);
        gap: 8px;
        overflow: hidden;
        padding: 8px;
        background:
          radial-gradient(circle at 20% -10%, rgba(124, 58, 237, 0.26), transparent 34%),
          radial-gradient(circle at 85% 0%, rgba(6, 182, 212, 0.18), transparent 30%),
          var(--bg);
      }

      #iframe-host::after {
        content: "";
        position: fixed;
        inset: 0;
        z-index: 1;
        background: rgba(2, 6, 23, 0.28);
        pointer-events: none;
      }

      #iframe-host .role-frame {
        width: 100%;
        height: 100%;
        min-height: 360px;
        border: 0;
        border-radius: 16px;
        background: white;
      }

      [data-openteam-iframe-hidden-host="true"] .role-frame {
        width: 420px;
        height: 720px;
        border: 0;
      }
    </style>
  </head>
  <body>
    <div id="app" class="app-shell">
      <div id="floating-toolbar" class="floating-toolbar">
        <div id="floating-drag-handle" class="drag-handle" role="button" tabindex="0" aria-label="拖动 OpenTeam 窗口">OpenTeam 群聊</div>
        <button id="toggle-window-size" class="btn" type="button" aria-expanded="true">缩小</button>
      </div>
      <aside class="panel sidebar">
        <div class="panel-header">
          <div class="brand-mark">
            <div class="logo-dot" aria-hidden="true"></div>
            <div>
              <h1>OpenTeam</h1>
              <p id="store-summary" class="tiny">加载群聊中</p>
            </div>
          </div>
          <button id="refresh-store" class="btn btn-ghost" type="button">刷新</button>
        </div>

        <form id="create-chat-form" class="chat-create">
          <div class="field">
            <label for="new-chat-name">新建群聊</label>
            <input id="new-chat-name" type="text" placeholder="例如：产品方案讨论" autocomplete="off" />
          </div>
          <div class="two-col">
            <select id="new-chat-mode" aria-label="群聊模式">
              <option value="independent">独立专家</option>
              <option value="collaborative">协作群聊</option>
            </select>
            <button class="btn btn-primary" type="submit">创建</button>
          </div>
        </form>

        <div id="chat-list" class="chat-list"></div>
      </aside>

      <main class="panel workspace">
        <header class="chat-header">
          <div class="chat-title-block">
            <h2 id="chat-title" class="chat-title">未选择群聊</h2>
            <p id="chat-subtitle" class="chat-subtitle">创建或选择一个群聊开始协作</p>
          </div>
          <div class="chat-row">
            <span id="chat-status" class="status-pill">空</span>
            <button id="restore-chat" class="btn" type="button">恢复聊天</button>
          </div>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="composer" class="composer">
          <div id="reference-draft" class="reference-draft" hidden></div>
          <div id="mention-panel" class="mention-panel" hidden></div>
          <textarea id="message-input" placeholder="输入任务；键入 @ 选择一个或多个角色。无 @ 时发送给全部角色。"></textarea>
          <div class="composer-actions">
            <div>
              <div id="target-preview" class="muted tiny">选择群聊后可发送</div>
              <div id="busy-preview" class="tiny"></div>
            </div>
            <button id="send-message" class="btn btn-primary" type="submit" disabled>发送</button>
          </div>
        </form>
      </main>

      <aside class="panel role-panel">
        <div class="panel-header">
          <div>
            <h2>角色与模板</h2>
            <p id="role-summary" class="tiny">0 个角色</p>
          </div>
          <button id="open-gemini-login" class="btn" type="button">Gemini 登录</button>
        </div>
        <div class="role-scroll">
          <div class="section-title">
            <h3>当前群聊角色</h3>
            <button id="initialize-role" class="btn" type="button">初始化/重新初始化</button>
          </div>
          <div id="role-list" class="role-list"></div>

          <form id="add-role-form" class="editor-card role-editor">
            <h3>添加角色</h3>
            <div class="field">
              <label for="role-template-select">从模板选择</label>
              <select id="role-template-select"></select>
            </div>
            <div class="field">
              <label for="new-role-name">角色名</label>
              <input id="new-role-name" type="text" placeholder="模板为空时必填" autocomplete="off" />
            </div>
            <button class="btn btn-primary" type="submit">加入当前群聊</button>
          </form>

          <form id="role-editor" class="editor-card role-editor">
            <h3>角色配置</h3>
            <div class="field">
              <label for="edit-role-name">名称</label>
              <input id="edit-role-name" type="text" autocomplete="off" />
            </div>
            <div class="field">
              <label for="edit-role-description">描述</label>
              <textarea id="edit-role-description"></textarea>
            </div>
            <div class="field">
              <label for="edit-role-prompt">System Prompt</label>
              <textarea id="edit-role-prompt"></textarea>
            </div>
            <div class="two-col">
              <button class="btn btn-primary" type="submit">保存角色</button>
              <button id="recover-role" class="btn" type="button">恢复角色</button>
            </div>
          </form>

          <div class="section-title">
            <h3>角色模板库</h3>
            <span id="template-summary" class="tiny">0 个模板</span>
          </div>
          <div id="template-list" class="template-list"></div>

          <form id="template-form" class="editor-card role-editor">
            <h3 id="template-form-title">创建模板</h3>
            <div class="field">
              <label for="template-name">模板名称</label>
              <input id="template-name" type="text" autocomplete="off" />
            </div>
            <div class="field">
              <label for="template-description">模板描述</label>
              <textarea id="template-description"></textarea>
            </div>
            <div class="field">
              <label for="template-prompt">模板 System Prompt</label>
              <textarea id="template-prompt"></textarea>
            </div>
            <div class="template-actions">
              <button class="btn btn-primary" type="submit">保存模板</button>
              <button id="reset-template-form" class="btn" type="button">新建</button>
              <button id="delete-template" class="btn btn-danger" type="button">删除</button>
            </div>
          </form>
        </div>
      </aside>
    </div>
    <div id="iframe-host" class="iframe-host" aria-hidden="true"></div>
    <div id="error" class="toast" hidden></div>
    <script type="module" src="team.js"></script>
  </body>
</html>
