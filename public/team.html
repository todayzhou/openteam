<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenTeam</title>
    <link rel="stylesheet" href="team.css" />
  </head>
  <body>
    <div id="app" class="app-shell">
      <div id="floating-toolbar" class="floating-toolbar">
        <div id="floating-drag-handle" class="drag-handle" role="button" tabindex="0" aria-label="拖动 OpenTeam 窗口">拖动</div>
        <button id="toggle-window-size" class="icon-btn" type="button" aria-expanded="true" aria-label="缩小窗口">−</button>
        <button id="close-window" class="icon-btn" type="button" aria-label="关闭窗口">×</button>
      </div>
      <nav class="rail" aria-label="OpenTeam 导航">
        <div></div>
        <div class="rail-actions">
          <button class="rail-btn active" type="button" aria-label="群聊">⌁</button>
          <button class="rail-btn" type="button" aria-label="消息">◌</button>
          <button class="rail-btn" type="button" aria-label="实验">⌬</button>
        </div>
        <div class="rail-bottom">
          <button id="settings-button" class="rail-btn" type="button" aria-label="设置" aria-expanded="false" aria-controls="settings-menu">⚙</button>
          <div id="settings-menu" class="settings-menu" hidden>
            <button id="open-people-library" class="btn btn-ghost" type="button">人员库</button>
          </div>
        </div>
      </nav>
      <aside class="panel sidebar">
        <div class="panel-header">
          <div class="brand-mark">
            <div class="logo-dot" aria-hidden="true"></div>
            <div>
              <h1>OpenTeam</h1>
            </div>
          </div>
          <button id="refresh-store" class="icon-btn" type="button" aria-label="同步并恢复当前群聊" title="同步并恢复当前群聊">↻</button>
        </div>

        <div class="sidebar-titlebar">
          <div>
            <h2>群聊</h2>
            <p id="store-summary" class="tiny">加载群聊中</p>
          </div>
          <button id="quick-create-chat" class="icon-btn" type="button" aria-label="新建群聊" aria-controls="chat-create-popover" aria-expanded="false">＋</button>
        </div>

        <form id="create-chat-form" class="chat-create" hidden>
          <div id="chat-create-popover">
            <h3>新建群聊</h3>
          </div>
          <div class="field">
            <label for="new-chat-name">群聊名称</label>
            <input id="new-chat-name" type="text" placeholder="例如：产品方案讨论" autocomplete="off" />
          </div>
          <div class="field">
            <label>群聊模式</label>
            <div class="mode-options">
              <label class="mode-option" for="new-chat-mode-independent">
                <input id="new-chat-mode-independent" type="radio" name="new-chat-mode" value="independent" checked />
                <span>
                  <span class="mode-name">独立专家</span>
                  <span class="mode-help">人员独立回答，适合并行评审。</span>
                </span>
              </label>
              <label class="mode-option" for="new-chat-mode-collaborative">
                <input id="new-chat-mode-collaborative" type="radio" name="new-chat-mode" value="collaborative" />
                <span>
                  <span class="mode-name">协作群聊</span>
                  <span class="mode-help">人员参考群聊上下文，适合接力讨论。</span>
                </span>
              </label>
            </div>
          </div>
          <div class="two-col">
            <button id="cancel-create-chat" class="btn" type="button">取消</button>
            <button class="btn btn-primary" type="submit">创建</button>
          </div>
        </form>

        <div id="chat-list" class="chat-list"></div>
      </aside>

      <main class="panel workspace">
        <header class="chat-header">
          <div class="chat-title-block">
            <h2 id="chat-title" class="chat-title">未选择群聊</h2>
            <p id="chat-subtitle" class="chat-subtitle">创建或选择一个群聊开始协作</p>
          </div>
          <div class="chat-row">
            <button id="toggle-people-drawer" class="btn drawer-summary" type="button" aria-expanded="false">成员 0</button>
            <span id="chat-status" class="status-pill">空</span>
            <button id="restore-chat" class="btn" type="button">恢复会话</button>
          </div>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="composer" class="composer">
          <div id="reference-draft" class="reference-draft" hidden></div>
          <div id="mention-panel" class="mention-panel" hidden></div>
          <textarea id="message-input" placeholder="输入消息，@成员可指定回复；不 @ 默认发给全部成员。"></textarea>
          <div class="composer-actions">
            <div>
              <div id="target-preview" class="muted tiny">选择群聊后可发送</div>
              <div id="busy-preview" class="tiny"></div>
            </div>
            <button id="send-message" class="btn btn-primary" type="submit" disabled>发送</button>
          </div>
        </form>
      </main>

      <aside class="panel role-panel">
        <div class="panel-header">
          <div>
            <h2>群聊成员与人员</h2>
            <p id="role-summary" class="tiny">0 个人员</p>
          </div>
          <button id="open-gemini-login" class="icon-btn" type="button" aria-label="AI 站点登录">◇</button>
        </div>
        <div class="role-scroll">
          <div class="section-title">
            <h3>当前群聊人员</h3>
            <button id="close-people-drawer" class="btn" type="button">收起</button>
          </div>
          <div id="role-list" class="role-list"></div>

          <form id="add-role-form" class="editor-card role-form">
            <h3>添加人员</h3>
            <p class="tiny">从人员库批量选择，或临时添加只属于当前群聊的人员。</p>
            <select id="role-template-select" hidden></select>
            <button class="btn btn-primary" type="submit">打开添加人员</button>
          </form>

        </div>
      </aside>
    </div>
    <span id="template-summary" hidden></span>
    <div id="template-list" hidden></div>
    <button id="window-launcher" class="launcher" type="button" aria-label="打开 OpenTeam" hidden>⌁</button>

    <div id="people-library-modal" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="people-library-title">
        <div class="modal-header">
          <div>
            <h2 id="people-library-title">人员库</h2>
            <p class="tiny">维护可复用人员人设；加入群聊后会复制为独立人员。</p>
          </div>
          <div class="chat-row">
            <button id="new-template" class="btn btn-primary" type="button">新建</button>
            <button id="close-people-library" class="icon-btn" type="button" aria-label="关闭人员库">×</button>
          </div>
        </div>
        <div class="people-library-content">
          <div class="people-library-pane">
            <div class="section-title">
              <h3>人员列表</h3>
              <span id="people-library-summary" class="tiny">0 人</span>
            </div>
            <div id="people-library-list" class="template-list"></div>
            <div id="people-library-pagination" class="pagination-bar"></div>
          </div>
        </div>
      </section>
    </div>

    <div id="person-template-modal" class="modal-backdrop" hidden>
      <section class="modal template-editor-modal" role="dialog" aria-modal="true" aria-labelledby="template-form-title">
        <div class="modal-header">
          <div>
            <h2 id="template-form-title">新建人员</h2>
            <p class="tiny">维护人员名称、人设和默认站点。</p>
          </div>
          <button id="close-person-template" class="icon-btn" type="button" aria-label="关闭人员编辑">×</button>
        </div>
        <form id="people-library-form" class="modal-form">
          <div class="field">
            <label for="template-name">人员名称</label>
            <input id="template-name" type="text" maxlength="10" autocomplete="off" />
          </div>
          <div class="field">
            <label for="template-description">描述</label>
            <textarea id="template-description"></textarea>
          </div>
          <div class="field">
            <label for="template-prompt">人设</label>
            <textarea id="template-prompt"></textarea>
          </div>
          <div class="field">
            <label>默认站点</label>
            <div class="site-segmented">
              <label class="site-segment" for="template-site-gemini">
                <input id="template-site-gemini" type="radio" name="template-chat-site" value="gemini" checked />
                <span>Gemini</span>
              </label>
              <label class="site-segment" for="template-site-chatgpt">
                <input id="template-site-chatgpt" type="radio" name="template-chat-site" value="chatgpt" />
                <span>ChatGPT</span>
              </label>
              <label class="site-segment" for="template-site-claude">
                <input id="template-site-claude" type="radio" name="template-chat-site" value="claude" />
                <span>Claude</span>
              </label>
            </div>
          </div>
          <div class="template-actions">
            <button class="btn btn-primary" type="submit">保存人员</button>
          </div>
        </form>
      </section>
    </div>

    <div id="add-person-modal" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="add-person-title">
        <div class="modal-header">
          <div>
            <h2 id="add-person-title">添加人员</h2>
            <p class="tiny">从人员库或临时草稿中选择人员，并为每个人指定站点。</p>
          </div>
          <div class="modal-header-actions">
            <button id="open-temporary-person" class="btn btn-ghost" type="button">临时添加</button>
          <button id="close-add-person" class="icon-btn" type="button" aria-label="关闭添加人员">×</button>
          </div>
        </div>
        <div class="modal-grid single-column">
          <form id="add-library-people-form" class="modal-form modal-card modal-grid-wide">
            <h3>选择人员</h3>
            <div id="add-library-people-list" class="select-list"></div>
            <button class="btn btn-primary" type="submit">加入选中人员</button>
          </form>
        </div>
      </section>
    </div>

    <div id="temporary-person-modal" class="modal-backdrop" hidden>
      <section class="modal template-editor-modal" role="dialog" aria-modal="true" aria-labelledby="temporary-person-title">
        <div class="modal-header">
          <div>
            <h2 id="temporary-person-title">临时添加</h2>
            <p class="tiny">临时人员会先进入待选列表，确认后才加入当前群聊。</p>
          </div>
          <button id="close-temporary-person" class="icon-btn" type="button" aria-label="关闭临时添加">×</button>
        </div>
          <form id="add-temporary-person-form" class="modal-form">
            <div class="field">
              <label for="temporary-person-name">人员名称</label>
              <input id="temporary-person-name" type="text" autocomplete="off" />
            </div>
            <div class="field">
              <label for="temporary-person-description">描述</label>
              <textarea id="temporary-person-description"></textarea>
            </div>
            <div class="field">
              <label for="temporary-person-prompt">人设</label>
              <textarea id="temporary-person-prompt"></textarea>
            </div>
            <button class="btn btn-primary" type="submit">加入待选列表</button>
          </form>
      </section>
    </div>

    <div id="iframe-host" class="iframe-host" aria-hidden="true"></div>
    <div id="error" class="toast" hidden></div>
    <script type="module" src="team.js"></script>
  </body>
</html>
