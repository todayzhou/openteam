name: Feature Request
description: Suggest a new feature or improvement
labels: ["type:enhancement", "status:triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Please describe what you'd like to see added or improved.

  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this feature solve? What use case are you trying to address?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe your ideal implementation.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What other approaches did you consider?

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, mockups, or links to related issues.
