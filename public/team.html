<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OpenTeam</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #000000;
        --panel: rgba(9, 15, 24, 0.86);
        --panel-strong: rgba(14, 22, 34, 0.94);
        --panel-soft: rgba(20, 31, 44, 0.64);
        --line: rgba(128, 151, 171, 0.16);
        --line-strong: rgba(118, 224, 221, 0.46);
        --text: #eef7fb;
        --muted: #9caeba;
        --subtle: #60717f;
        --brand: #2fd8cc;
        --brand-deep: #146a75;
        --danger: #ff8aa5;
        --warning: #f8b84e;
        --success: #53e6a6;
        --bubble: rgba(14, 24, 35, 0.78);
        --shadow: 0 32px 90px rgba(0, 0, 0, 0.48);
        --glow: 0 0 0 1px rgba(47, 216, 204, 0.18), 0 0 30px rgba(47, 216, 204, 0.12);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 0;
        min-height: 100vh;
        overflow: hidden;
        background: var(--bg);
        color: var(--text);
        font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "SF Pro Display", "PingFang SC", "Segoe UI", sans-serif;
      }

      button,
      input,
      textarea,
      select {
        font: inherit;
      }

      button {
        border: 0;
      }

      .app-shell {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 2;
        display: grid;
        width: min(1500px, calc(100vw - 56px));
        height: min(900px, calc(100vh - 34px));
        grid-template-columns: 54px minmax(220px, 260px) minmax(520px, 1fr);
        border: 1px solid rgba(132, 153, 171, 0.24);
        border-radius: 18px;
        background:
          linear-gradient(180deg, rgba(13, 24, 35, 0.98), rgba(6, 13, 21, 0.98));
        box-shadow: var(--shadow);
        transform: translate(-50%, -50%);
        overflow: hidden;
        pointer-events: none;
        backdrop-filter: blur(26px);
      }

      .app-shell.minimized {
        display: none;
      }

      .launcher {
        position: fixed;
        right: 24px;
        bottom: 24px;
        z-index: 4;
        display: grid;
        place-items: center;
        width: 64px;
        height: 64px;
        border: 1px solid rgba(47, 216, 204, 0.46);
        border-radius: 50%;
        background:
          radial-gradient(circle at 35% 22%, rgba(122, 240, 210, 0.32), transparent 38%),
          rgba(8, 17, 26, 0.94);
        color: #eaffff;
        cursor: pointer;
        font-size: 24px;
        font-weight: 780;
        box-shadow: var(--shadow), var(--glow);
        backdrop-filter: blur(18px);
      }

      .launcher[hidden] {
        display: none;
      }

      .floating-toolbar {
        position: absolute;
        right: 12px;
        top: 10px;
        z-index: 5;
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 4px;
        width: auto;
        height: 28px;
        border: 0;
        padding: 0;
        background: transparent;
        box-shadow: none;
        transform: none;
        backdrop-filter: blur(18px);
        pointer-events: auto;
      }

      .floating-toolbar .icon-btn {
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: transparent;
      }

      .drag-handle {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
        width: 18px;
        height: 28px;
        overflow: hidden;
        color: transparent;
        cursor: grab;
        user-select: none;
        font-size: 0;
      }

      .drag-handle:active,
      .app-shell.dragging .drag-handle {
        cursor: grabbing;
      }

      .drag-handle::before {
        content: "";
        width: 14px;
        height: 14px;
        border: 1px solid rgba(188, 203, 216, 0.56);
        border-radius: 4px;
        background:
          linear-gradient(90deg, transparent 5px, rgba(188, 203, 216, 0.58) 6px, transparent 7px),
          linear-gradient(transparent 5px, rgba(188, 203, 216, 0.58) 6px, transparent 7px);
        box-shadow: none;
      }

      .panel {
        min-height: 0;
        overflow: hidden;
        border: 0;
        border-radius: 0;
        background: transparent;
        box-shadow: none;
        backdrop-filter: none;
        pointer-events: auto;
      }

      .rail {
        position: relative;
        display: grid;
        grid-template-rows: 92px 1fr auto;
        border-right: 1px solid var(--line);
        background: linear-gradient(180deg, rgba(10, 17, 26, 0.74), rgba(5, 10, 16, 0.5));
        pointer-events: auto;
      }

      .rail-actions {
        display: grid;
        gap: 14px;
        align-content: start;
        justify-items: center;
        padding-top: 18px;
      }

      .rail-btn,
      .icon-btn {
        display: inline-grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: #b6c4cf;
        cursor: pointer;
        transition: 0.16s ease;
      }

      .rail-btn.active,
      .rail-btn:hover,
      .icon-btn:hover {
        border-color: rgba(47, 216, 204, 0.22);
        background: rgba(158, 181, 199, 0.12);
        color: #ffffff;
      }

      .rail-bottom {
        display: grid;
        justify-items: center;
        gap: 12px;
        padding: 0 0 18px;
      }

      #settings-button {
        width: 40px;
        height: 40px;
        font-size: 22px;
      }

      .sidebar,
      .role-panel {
        display: flex;
        flex-direction: column;
      }

      .sidebar {
        position: relative;
      }

      .sidebar,
      .workspace {
        border-right: 1px solid var(--line);
      }

      .sidebar-titlebar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 8px 18px 10px;
      }

      .role-panel .panel-header {
        min-height: 92px;
        padding-left: 22px;
      }

      .panel-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        min-height: 78px;
        padding: 22px 18px 15px;
        border-bottom: 1px solid rgba(128, 151, 171, 0.08);
      }

      .brand-mark {
        display: flex;
        align-items: center;
        gap: 10px;
        min-width: 0;
      }

      .logo-dot {
        position: relative;
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background:
          conic-gradient(from 20deg, var(--brand) 0 90deg, transparent 90deg 130deg, #7af0d2 130deg 220deg, transparent 220deg 274deg, #4c6dff 274deg 330deg, transparent 330deg),
          rgba(47, 216, 204, 0.08);
        box-shadow: 0 0 24px rgba(47, 216, 204, 0.28);
      }

      .logo-dot::after {
        content: "";
        position: absolute;
        inset: 8px;
        border-radius: 50%;
        background: #0a131d;
      }

      h1,
      h2,
      h3,
      p {
        margin: 0;
      }

      h1 {
        font-size: 22px;
        line-height: 1.1;
        font-weight: 760;
      }

      h2 {
        font-size: 17px;
        font-weight: 760;
      }

      h3 {
        font-size: 13px;
        font-weight: 760;
      }

      .muted {
        color: var(--muted);
      }

      .tiny {
        color: var(--subtle);
        font-size: 12px;
      }

      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 36px;
        border: 1px solid rgba(132, 153, 171, 0.2);
        border-radius: 8px;
        padding: 0 14px;
        background: rgba(132, 153, 171, 0.1);
        color: var(--text);
        cursor: pointer;
        font-size: 12px;
        font-weight: 720;
        transition: 0.16s ease;
      }

      .btn:hover:not(:disabled) {
        border-color: rgba(47, 216, 204, 0.42);
        background: rgba(47, 216, 204, 0.12);
      }

      .btn-primary {
        border-color: rgba(47, 216, 204, 0.44);
        background: linear-gradient(135deg, rgba(47, 216, 204, 0.88), rgba(43, 155, 170, 0.88));
        color: #eaffff;
        box-shadow: 0 0 18px rgba(47, 216, 204, 0.16) inset;
      }

      .btn-primary:hover:not(:disabled) {
        filter: brightness(1.08);
      }

      .btn-danger {
        border-color: rgba(255, 138, 165, 0.22);
        background: rgba(255, 138, 165, 0.12);
        color: #ffd6df;
      }

      .btn-ghost {
        background: transparent;
        color: var(--muted);
      }

      .btn:disabled {
        cursor: not-allowed;
        opacity: 0.48;
      }

      .icon-btn:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .settings-menu {
        position: absolute;
        left: 52px;
        bottom: 18px;
        z-index: 8;
        width: 112px;
        border: 1px solid rgba(132, 153, 171, 0.24);
        border-radius: 10px;
        padding: 8px;
        background: rgba(9, 17, 25, 0.96);
        box-shadow: var(--shadow), var(--glow);
        backdrop-filter: blur(18px);
      }

      .settings-menu[hidden] {
        display: none;
      }

      .settings-menu button {
        width: 100%;
        justify-content: flex-start;
      }

      .chat-create {
        position: absolute;
        top: 142px;
        right: 14px;
        left: 14px;
        z-index: 6;
        display: grid;
        gap: 10px;
        border: 1px solid rgba(132, 153, 171, 0.24);
        border-radius: 10px;
        padding: 12px;
        background:
          radial-gradient(circle at 18% 0%, rgba(47, 216, 204, 0.12), transparent 42%),
          rgba(9, 17, 25, 0.96);
        box-shadow: 0 20px 52px rgba(0, 0, 0, 0.42), var(--glow);
        backdrop-filter: blur(20px);
      }

      .chat-create[hidden] {
        display: none;
      }

      .mode-options {
        display: grid;
        gap: 8px;
      }

      .mode-option {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 8px;
        align-items: start;
        border: 1px solid rgba(132, 153, 171, 0.16);
        border-radius: 8px;
        padding: 9px;
        background: rgba(132, 153, 171, 0.06);
        cursor: pointer;
      }

      .mode-option:has(input:checked) {
        border-color: rgba(47, 216, 204, 0.52);
        background: rgba(47, 216, 204, 0.1);
      }

      .mode-option input {
        width: 14px;
        height: 14px;
        margin: 2px 0 0;
        accent-color: var(--brand);
      }

      .mode-name {
        display: block;
        color: var(--text);
        font-size: 12px;
        font-weight: 760;
      }

      .mode-help {
        display: block;
        margin-top: 2px;
        color: var(--subtle);
        font-size: 11px;
        line-height: 1.35;
      }

      .site-segmented {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        overflow: hidden;
        border: 1px solid rgba(132, 153, 171, 0.18);
        border-radius: 8px;
        padding: 3px;
        background: rgba(6, 13, 21, 0.72);
      }

      .site-segment {
        position: relative;
        display: grid;
        place-items: center;
        min-height: 34px;
        border-radius: 6px;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 760;
      }

      .site-segment input {
        position: absolute;
        inset: 0;
        opacity: 0;
        cursor: pointer;
      }

      .site-segment:has(input:checked) {
        background: rgba(47, 216, 204, 0.14);
        color: #eaffff;
        box-shadow: inset 0 0 0 1px rgba(47, 216, 204, 0.42);
      }

      .field,
      .template-grid {
        display: grid;
        gap: 7px;
      }

      label {
        color: var(--muted);
        font-size: 11px;
        font-weight: 700;
      }

      input,
      textarea,
      select {
        width: 100%;
        border: 1px solid rgba(132, 153, 171, 0.18);
        border-radius: 8px;
        background: rgba(3, 9, 15, 0.5);
        color: var(--text);
        outline: none;
      }

      input,
      select {
        height: 36px;
        padding: 0 11px;
      }

      textarea {
        min-height: 74px;
        resize: vertical;
        padding: 10px 11px;
        line-height: 1.5;
      }

      input:focus,
      textarea:focus,
      select:focus {
        border-color: rgba(47, 216, 204, 0.62);
        box-shadow: 0 0 0 3px rgba(47, 216, 204, 0.1);
      }

      .chat-list {
        display: flex;
        min-height: 0;
        flex: 1;
        flex-direction: column;
        gap: 0;
        overflow: auto;
        padding: 10px 0 18px;
      }

      .chat-item {
        position: relative;
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) auto;
        gap: 12px;
        align-items: start;
        width: 100%;
        min-height: 0;
        border: 0;
        border-radius: 0;
        padding: 12px 16px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        text-align: left;
        transition: 0.16s ease;
      }

      .chat-item::after {
        content: "";
        grid-column: 2 / 4;
        height: 1px;
        margin-top: 2px;
        background: rgba(132, 153, 171, 0.1);
      }

      .chat-item.has-activity {
        background: transparent;
      }

      .chat-item.has-activity .chat-avatar::after {
        content: "";
        position: absolute;
        top: -2px;
        right: -2px;
        width: 8px;
        height: 8px;
        border: 2px solid #111b25;
        border-radius: 999px;
        background: #ff4d4f;
      }

      .chat-menu-btn {
        width: 22px;
        height: 22px;
        border-radius: 7px;
        color: var(--muted);
        opacity: 0;
      }

      .chat-item:hover .chat-menu-btn,
      .chat-item.active .chat-menu-btn,
      .chat-item:focus-within .chat-menu-btn {
        opacity: 1;
      }

      .chat-action-menu {
        position: absolute;
        top: 38px;
        right: 14px;
        z-index: 8;
        display: grid;
        gap: 6px;
        min-width: 116px;
        border: 1px solid rgba(132, 153, 171, 0.18);
        border-radius: 8px;
        padding: 8px;
        background: rgba(8, 16, 24, 0.92);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34);
      }

      .chat-action-menu .btn {
        width: 100%;
        justify-content: flex-start;
      }

      .chat-action-menu .btn-danger {
        color: #ff9a9a;
      }

      .chat-item:hover,
      .chat-item.active {
        background:
          linear-gradient(90deg, rgba(47, 216, 204, 0.09), rgba(47, 216, 204, 0.02)),
          rgba(132, 153, 171, 0.045);
      }

      .chat-row,
      .message-meta,
      .role-row,
      .template-actions,
      .composer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
      }

      .chat-item-title {
        align-items: flex-start;
        gap: 8px;
      }

      .chat-avatar {
        position: relative;
        display: grid;
        place-items: center;
        width: 44px;
        height: 44px;
        border-radius: 8px;
        color: #ffffff;
        font-size: 16px;
        font-weight: 780;
        line-height: 1;
        box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
      }

      .chat-item-body {
        min-width: 0;
      }

      .chat-item-side {
        display: grid;
        justify-items: end;
        gap: 8px;
        min-width: 44px;
      }

      .chat-time {
        color: var(--subtle);
        font-size: 10px;
        font-weight: 680;
        line-height: 1.35;
        white-space: nowrap;
      }

      .chat-name,
      .role-name {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-weight: 760;
      }

      .chat-name {
        flex: 1 1 auto;
        min-width: 0;
        min-height: 0;
        justify-content: flex-start;
        border: 0;
        border-radius: 0;
        padding: 0;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        font-size: 14px;
        line-height: 1.35;
        text-align: left;
      }

      .chat-name:hover {
        color: #ffffff;
      }

      .summary-line {
        display: block;
        overflow: hidden;
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .status-pill,
      .mention-chip {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        width: fit-content;
        border: 0;
        border-radius: 999px;
        padding: 0;
        background: transparent;
        color: var(--muted);
        font-size: 11px;
        font-weight: 740;
      }

      .status-pill::before {
        content: "";
        display: inline-block;
        width: 7px;
        height: 7px;
        margin-right: 8px;
        border-radius: 50%;
        background: currentColor;
        box-shadow: 0 0 10px currentColor;
      }

      .status-ready {
        color: var(--success);
      }

      .status-thinking,
      .status-running,
      .status-loading,
      .status-initializing {
        color: var(--warning);
      }

      .status-error {
        color: var(--danger);
      }

      .workspace {
        display: grid;
        grid-template-rows: auto 1fr auto;
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        min-height: 72px;
        padding: 16px 132px 14px 22px;
        border-bottom: 1px solid rgba(128, 151, 171, 0.08);
        background: rgba(14, 20, 26, 0.86);
      }

      .chat-header .chat-row {
        flex: 0 0 auto;
        gap: 8px;
      }

      #chat-status {
        white-space: nowrap;
      }

      #restore-chat {
        width: 36px;
        min-width: 36px;
        padding: 0;
        font-size: 0;
      }

      #restore-chat::before {
        content: "↺";
        font-size: 16px;
      }

      .chat-title-block {
        flex: 1 1 auto;
        min-width: 0;
      }

      .chat-title {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
        font-size: 18px;
        line-height: 1.25;
      }

      .chat-subtitle {
        margin-top: 5px;
        color: var(--muted);
        font-size: 12px;
      }

      .messages {
        display: flex;
        min-height: 0;
        flex-direction: column;
        gap: 10px;
        overflow: auto;
        padding: 18px 28px 22px;
        background: #111418;
      }

      .empty-state {
        display: grid;
        place-items: center;
        min-height: 100%;
        color: var(--muted);
        text-align: center;
      }

      .empty-card {
        max-width: 420px;
        border: 1px solid rgba(132, 153, 171, 0.18);
        border-radius: 12px;
        padding: 24px;
        background: rgba(14, 24, 35, 0.58);
      }

      .message-row {
        display: flex;
        width: 100%;
        align-items: flex-start;
      }

      .message-row.user {
        justify-content: flex-end;
      }

      .message-row.system {
        justify-content: center;
      }

      .message-inner {
        display: flex;
        max-width: min(78%, 720px);
        align-items: flex-start;
        gap: 9px;
      }

      .message-row.user .message-inner {
        flex-direction: row-reverse;
      }

      .message-stack {
        display: flex;
        min-width: 0;
        max-width: 100%;
        flex-direction: column;
        align-items: flex-start;
      }

      .message-row.user .message-stack {
        align-items: flex-end;
      }

      .message-name {
        max-width: 100%;
        overflow: hidden;
        margin: 0 0 4px 2px;
        color: #9aa4ad;
        font-size: 11px;
        font-weight: 650;
        line-height: 1.3;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .message-time-divider {
        align-self: center;
        width: fit-content;
        max-width: 72%;
        border-radius: 999px;
        padding: 3px 9px;
        background: rgba(255, 255, 255, 0.12);
        color: rgba(243, 245, 246, 0.62);
        font-size: 11px;
        line-height: 1.4;
      }

      .message-system-pill {
        max-width: 72%;
        border-radius: 999px;
        padding: 5px 11px;
        background: rgba(255, 255, 255, 0.12);
        color: rgba(243, 245, 246, 0.72);
        font-size: 12px;
        line-height: 1.45;
        text-align: center;
      }

      .thinking-dots::after {
        content: "...";
        display: inline-block;
        width: 28px;
        animation: pulseDots 1.2s steps(4, end) infinite;
      }

      @keyframes pulseDots {
        0% { content: ""; }
        25% { content: "."; }
        50% { content: ".."; }
        75%, 100% { content: "..."; }
      }

      .message-avatar {
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        flex: 0 0 38px;
        border: 1px solid rgba(255, 255, 255, 0.24);
        border-radius: 8px;
        color: white;
        overflow: hidden;
        font-size: 14px;
        font-weight: 780;
        line-height: 1;
        white-space: nowrap;
        box-shadow: 0 6px 16px rgba(0, 0, 0, 0.18);
      }

      .message-avatar[hidden] {
        visibility: hidden;
        display: grid;
      }

      .message-bubble {
        position: relative;
        max-width: 100%;
        border: 0;
        border-radius: 8px;
        background: #1f252c;
        color: #f3f5f6;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.16);
      }

      .message-bubble::before {
        content: "";
        position: absolute;
        top: 13px;
        border: 6px solid transparent;
      }

      .message-row.assistant .message-bubble::before {
        left: -11px;
        border-right-color: #1f252c;
      }

      .message-row.user .message-bubble {
        background: #35d18c;
        color: #111111;
      }

      .message-row.user .message-bubble::before {
        right: -11px;
        border-left-color: #35d18c;
      }

      .message-row.thinking .message-bubble {
        background: #232a22;
        color: #d8f1dc;
      }

      .message-row.thinking .message-bubble::before {
        border-right-color: #232a22;
      }

      .message-mentions {
        display: inline-flex;
        flex-wrap: wrap;
        gap: 6px;
        margin-right: 6px;
      }

      .message-mention {
        color: #0b6b39;
        font-weight: 820;
      }

      .message-body {
        margin-top: 0;
        padding: 9px 13px 10px;
        white-space: pre-wrap;
        word-break: break-word;
        color: inherit;
        font-size: 14px;
        line-height: 1.58;
      }

      .reference-box {
        display: -webkit-box;
        overflow: hidden;
        margin: 0 10px 10px;
        border: 0;
        border-radius: 6px;
        padding: 6px 8px;
        background: rgba(255, 255, 255, 0.08);
        color: currentColor;
        opacity: 0.68;
        font-size: 12px;
        line-height: 1.45;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
      }

      .message-tools {
        display: flex;
        justify-content: flex-end;
        margin-top: -2px;
        padding: 0 8px 7px;
        opacity: 0;
        transition: opacity 0.16s ease;
      }

      .message-row.assistant:hover .message-tools,
      .message-row.assistant:focus-within .message-tools {
        opacity: 1;
      }

      .composer {
        position: relative;
        display: flex;
        align-items: end;
        gap: 10px;
        margin: 0;
        padding: 10px 14px 12px;
        border: 0;
        border-top: 1px solid rgba(132, 153, 171, 0.12);
        border-radius: 0;
        background: #151a1f;
        box-shadow: none;
      }

      .reference-draft {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        position: absolute;
        left: 0;
        right: 0;
        bottom: calc(100% + 10px);
        border: 1px solid rgba(47, 216, 204, 0.28);
        border-radius: 8px;
        padding: 10px 12px;
        background: rgba(9, 19, 28, 0.96);
      }

      .reference-draft[hidden] {
        display: none;
      }

      .reference-draft-preview {
        min-width: 0;
        overflow: hidden;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.35;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .reference-draft .btn {
        min-height: 24px;
        flex: 0 0 auto;
        padding: 0 8px;
      }

      .mention-panel {
        position: absolute;
        left: 12px;
        bottom: calc(100% + 8px);
        z-index: 2;
        width: min(280px, calc(100% - 24px));
        max-height: 260px;
        overflow: auto;
        border: 1px solid rgba(132, 153, 171, 0.26);
        border-radius: 8px;
        background: #101a26;
        box-shadow: var(--shadow);
      }

      .mention-option {
        display: flex;
        align-items: center;
        gap: 8px;
        width: 100%;
        border-radius: 0;
        padding: 7px 12px;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        text-align: left;
      }

      .mention-option:hover,
      .mention-option.active {
        background: rgba(47, 216, 204, 0.12);
      }

      #message-input {
        min-height: 44px;
        max-height: 120px;
        flex: 1;
        border: 0;
        background: transparent;
        resize: none;
        padding: 10px 2px;
      }

      #message-input:focus {
        box-shadow: none;
      }

      .composer-actions {
        flex: 0 0 auto;
      }

      .composer-actions > div {
        display: none;
      }

      #send-message {
        width: 40px;
        min-width: 40px;
        height: 40px;
        padding: 0;
        border-radius: 8px;
        font-size: 0;
      }

      #send-message::before {
        content: "➤";
        font-size: 17px;
        transform: translateX(1px);
      }

      .role-list,
      .template-list {
        display: grid;
        gap: 8px;
      }

      .role-scroll {
        position: relative;
        min-height: 0;
        overflow: auto;
        padding: 14px 14px 22px;
      }

      .role-panel {
        position: absolute;
        top: 0;
        right: 0;
        z-index: 4;
        width: min(380px, calc(100% - 54px));
        height: 100%;
        border-left: 1px solid var(--line);
        background: rgba(7, 14, 22, 0.96);
        box-shadow: -26px 0 60px rgba(0, 0, 0, 0.34);
        transform: translateX(100%);
        transition: transform 0.18s ease;
      }

      .role-panel.open {
        transform: translateX(0);
      }

      .drawer-summary {
        min-height: 30px;
        border-color: transparent;
        background: rgba(255, 255, 255, 0.045);
        color: var(--muted);
        white-space: nowrap;
      }

      .role-card,
      .template-card,
      .editor-card,
      .modal-card {
        border: 1px solid rgba(132, 153, 171, 0.14);
        border-radius: 8px;
        padding: 12px;
        background: rgba(14, 24, 35, 0.54);
      }

      .role-card {
        position: relative;
        display: grid;
        grid-template-columns: 44px minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
        min-height: 70px;
        cursor: pointer;
      }

      .role-card.active,
      .template-card.active {
        border-color: rgba(47, 216, 204, 0.56);
        background: rgba(47, 216, 204, 0.1);
        box-shadow: var(--glow);
      }

      .role-avatar,
      .mention-avatar {
        display: inline-grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 50%;
        flex: 0 0 auto;
        overflow: hidden;
        color: white;
        font-size: 14px;
        font-weight: 780;
        line-height: 1;
        white-space: nowrap;
      }

      .mention-avatar {
        width: 22px;
        height: 22px;
        font-size: 11px;
      }

      .role-tone-0 { background: linear-gradient(135deg, #76eaa8, #1d9f70); }
      .role-tone-1 { background: linear-gradient(135deg, #7aa7ff, #3d64df); }
      .role-tone-2 { background: linear-gradient(135deg, #ffc25d, #c77b24); }
      .role-tone-3 { background: linear-gradient(135deg, #a989ff, #6c4fcb); }
      .role-tone-4 { background: linear-gradient(135deg, #f58faf, #cf5d84); }
      .role-tone-5 { background: linear-gradient(135deg, #63dad3, #278f9a); }

      .role-card-main {
        min-width: 0;
      }

      .role-more {
        display: grid;
        place-items: center;
        width: 28px;
        height: 28px;
        border-radius: 8px;
        background: transparent;
        color: #95a7b5;
        cursor: pointer;
        font-size: 18px;
        line-height: 1;
      }

      .role-more:hover {
        background: rgba(132, 153, 171, 0.1);
        color: var(--text);
      }

      .role-meta {
        justify-content: flex-start;
        gap: 8px;
        margin-top: 5px;
        flex-wrap: wrap;
      }

      .role-site-control {
        position: relative;
        display: inline-flex;
      }

      .site-pill {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        min-height: 24px;
        border: 1px solid rgba(132, 153, 171, 0.18);
        border-radius: 999px;
        padding: 0 9px;
        background: rgba(132, 153, 171, 0.08);
        color: var(--muted);
        cursor: pointer;
        font-size: 11px;
        font-weight: 820;
        line-height: 1;
      }

      .site-pill::after {
        content: "⌄";
        color: currentColor;
        font-size: 10px;
        opacity: 0.72;
      }

      .site-pill-gemini {
        border-color: rgba(47, 216, 204, 0.34);
        background: rgba(47, 216, 204, 0.1);
        color: #8ff5ed;
      }

      .site-pill-chatgpt {
        border-color: rgba(83, 230, 166, 0.3);
        background: rgba(83, 230, 166, 0.09);
        color: #9ef4c8;
      }

      .site-pill-claude {
        border-color: rgba(248, 184, 78, 0.32);
        background: rgba(248, 184, 78, 0.1);
        color: #f5cd82;
      }

      .role-site-menu {
        position: absolute;
        left: 0;
        top: calc(100% + 6px);
        z-index: 9;
        display: grid;
        gap: 4px;
        min-width: 128px;
        border: 1px solid rgba(132, 153, 171, 0.2);
        border-radius: 8px;
        padding: 6px;
        background: rgba(8, 16, 24, 0.96);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.34), var(--glow);
      }

      .role-site-option {
        display: flex;
        align-items: center;
        justify-content: flex-start;
        min-height: 30px;
        border-radius: 6px;
        padding: 0 9px;
        background: transparent;
        color: var(--muted);
        cursor: pointer;
        font-size: 12px;
        font-weight: 740;
        text-align: left;
      }

      .role-site-option:hover,
      .role-site-option.active {
        background: rgba(47, 216, 204, 0.1);
        color: var(--text);
      }

      .role-description,
      .template-description {
        margin-top: 2px;
        color: var(--muted);
        font-size: 12px;
        line-height: 1.45;
      }

      .role-form,
      .modal-form {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        z-index: 9;
        display: grid;
        place-items: center;
        padding: 24px;
        background: rgba(1, 5, 12, 0.58);
        backdrop-filter: blur(10px);
      }

      .modal-backdrop[hidden] {
        display: none;
      }

      .modal {
        width: min(820px, 100%);
        max-height: min(760px, calc(100vh - 48px));
        overflow: auto;
        border: 1px solid rgba(132, 153, 171, 0.24);
        border-radius: 16px;
        padding: 20px;
        background: rgba(9, 17, 25, 0.98);
        box-shadow: var(--shadow), var(--glow);
      }

      #people-library-modal .modal {
        display: flex;
        min-height: min(620px, calc(100vh - 48px));
        width: min(640px, 100%);
        flex-direction: column;
        overflow: hidden;
      }

      .people-library-content {
        min-height: 0;
        flex: 1;
      }

      .people-library-pane {
        min-height: 0;
        overflow: hidden;
      }

      #people-library-list {
        max-height: calc(100vh - 220px);
        overflow: auto;
        padding-right: 2px;
      }

      .template-card {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: center;
      }

      .template-card-body {
        min-width: 0;
      }

      .template-edit {
        min-height: 30px;
        padding: 0 10px;
      }

      .template-card-actions {
        display: flex;
        align-items: center;
        gap: 6px;
      }

      .template-editor-modal {
        width: min(520px, 100%);
      }

      .modal-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 16px;
      }

      .modal-grid {
        display: grid;
        grid-template-columns: minmax(220px, 0.9fr) minmax(280px, 1.1fr);
        gap: 14px;
      }

      .modal-grid-wide {
        grid-column: 1 / -1;
      }

      .select-list {
        display: grid;
        gap: 8px;
        max-height: 360px;
        overflow: auto;
      }

      .select-row {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr);
        gap: 10px;
        align-items: start;
        border: 1px solid rgba(132, 153, 171, 0.14);
        border-radius: 8px;
        padding: 10px;
        background: rgba(14, 24, 35, 0.46);
      }

      .site-picker {
        display: grid;
        gap: 8px;
        margin-bottom: 4px;
      }

      #add-role-form {
        border-color: rgba(132, 153, 171, 0.1);
        background: rgba(8, 16, 24, 0.42);
      }

      .section-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 6px 0 12px;
      }

      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .toast {
        position: fixed;
        right: 22px;
        bottom: 22px;
        z-index: 10;
        max-width: 460px;
        border: 1px solid rgba(255, 138, 165, 0.36);
        border-radius: 8px;
        padding: 12px 14px;
        background: #33111b;
        color: #fecdd3;
        box-shadow: var(--shadow);
      }

      #iframe-host {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow: auto;
        padding: 14px;
        background: #000000;
        scroll-snap-type: y proximity;
      }

      #iframe-host .chat-frame-group {
        position: relative;
        z-index: 0;
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        grid-template-rows: auto;
        grid-auto-rows: calc(100vh - 92px);
        gap: 10px;
        flex: 0 0 calc(100vh - 28px);
        width: 100%;
        height: calc(100vh - 28px);
        min-height: calc(100vh - 28px);
        border: 1px solid rgba(132, 153, 171, 0.14);
        border-radius: 10px;
        padding: 10px;
        overflow: auto;
        background: rgba(5, 8, 12, 0.82);
        scroll-snap-align: start;
        transition: border-color 0.18s ease, box-shadow 0.18s ease, outline-color 0.18s ease;
      }

      #iframe-host .chat-frame-group-title {
        position: sticky;
        top: 0;
        z-index: 2;
        grid-column: 1 / -1;
        overflow: hidden;
        min-height: 34px;
        border-bottom: 1px solid rgba(132, 153, 171, 0.12);
        padding: 7px 8px 8px;
        background: rgba(5, 8, 12, 0.96);
        color: #dceaf2;
        font-size: 13px;
        font-weight: 780;
        line-height: 1.3;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #iframe-host .chat-frame-group.active {
        border-color: rgba(47, 216, 204, 0.68);
        outline: 2px solid rgba(47, 216, 204, 0.55);
        outline-offset: -2px;
        box-shadow: 0 0 0 1px rgba(47, 216, 204, 0.18), 0 0 34px rgba(47, 216, 204, 0.16), 0 16px 42px rgba(0, 0, 0, 0.32);
      }

      #iframe-host .chat-frame-group.background {
        border-color: rgba(132, 153, 171, 0.14);
      }

      #iframe-host .role-frame-shell {
        display: grid;
        grid-template-rows: auto minmax(0, 1fr);
        min-height: 240px;
        overflow: hidden;
        border: 1px solid rgba(132, 153, 171, 0.14);
        border-radius: 12px;
        background: rgba(7, 14, 22, 0.64);
      }

      #iframe-host .role-frame-label {
        overflow: hidden;
        padding: 6px 9px;
        border-bottom: 1px solid rgba(132, 153, 171, 0.12);
        color: #d8e6ed;
        font-size: 12px;
        font-weight: 760;
        line-height: 1.3;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      #iframe-host .role-frame {
        width: 100%;
        height: 100%;
        min-height: 0;
        border: 0;
        background: white;
      }

      @media (max-width: 1120px) {
        body {
          overflow: hidden;
        }

        .app-shell {
          width: calc(100vw - 28px);
          height: calc(100vh - 28px);
          grid-template-columns: 48px minmax(188px, 230px) minmax(300px, 1fr);
        }

        .role-panel {
          width: min(360px, calc(100% - 48px));
        }

        .workspace {
          border-right: 0;
        }

        .chat-header {
          padding-right: 72px;
        }

        .messages {
          padding-inline: 20px;
        }

        #iframe-host .chat-frame-group {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        #iframe-host .chat-frame-group {
          grid-template-columns: minmax(0, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <div id="app" class="app-shell">
      <div id="floating-toolbar" class="floating-toolbar">
        <div id="floating-drag-handle" class="drag-handle" role="button" tabindex="0" aria-label="拖动 OpenTeam 窗口">拖动</div>
        <button id="toggle-window-size" class="icon-btn" type="button" aria-expanded="true" aria-label="缩小窗口">−</button>
        <button id="close-window" class="icon-btn" type="button" aria-label="关闭窗口">×</button>
      </div>
      <nav class="rail" aria-label="OpenTeam 导航">
        <div></div>
        <div class="rail-actions">
          <button class="rail-btn active" type="button" aria-label="群聊">⌁</button>
          <button class="rail-btn" type="button" aria-label="消息">◌</button>
          <button class="rail-btn" type="button" aria-label="实验">⌬</button>
        </div>
        <div class="rail-bottom">
          <button id="settings-button" class="rail-btn" type="button" aria-label="设置" aria-expanded="false" aria-controls="settings-menu">⚙</button>
          <div id="settings-menu" class="settings-menu" hidden>
            <button id="open-people-library" class="btn btn-ghost" type="button">人员库</button>
          </div>
        </div>
      </nav>
      <aside class="panel sidebar">
        <div class="panel-header">
          <div class="brand-mark">
            <div class="logo-dot" aria-hidden="true"></div>
            <div>
              <h1>OpenTeam</h1>
            </div>
          </div>
          <button id="refresh-store" class="icon-btn" type="button" aria-label="同步并恢复当前群聊" title="同步并恢复当前群聊">↻</button>
        </div>

        <div class="sidebar-titlebar">
          <div>
            <h2>群聊</h2>
            <p id="store-summary" class="tiny">加载群聊中</p>
          </div>
          <button id="quick-create-chat" class="icon-btn" type="button" aria-label="新建群聊" aria-controls="chat-create-popover" aria-expanded="false">＋</button>
        </div>

        <form id="create-chat-form" class="chat-create" hidden>
          <div id="chat-create-popover">
            <h3>新建群聊</h3>
          </div>
          <div class="field">
            <label for="new-chat-name">群聊名称</label>
            <input id="new-chat-name" type="text" placeholder="例如：产品方案讨论" autocomplete="off" />
          </div>
          <div class="field">
            <label>群聊模式</label>
            <div class="mode-options">
              <label class="mode-option" for="new-chat-mode-independent">
                <input id="new-chat-mode-independent" type="radio" name="new-chat-mode" value="independent" checked />
                <span>
                  <span class="mode-name">独立专家</span>
                  <span class="mode-help">人员独立回答，适合并行评审。</span>
                </span>
              </label>
              <label class="mode-option" for="new-chat-mode-collaborative">
                <input id="new-chat-mode-collaborative" type="radio" name="new-chat-mode" value="collaborative" />
                <span>
                  <span class="mode-name">协作群聊</span>
                  <span class="mode-help">人员参考群聊上下文，适合接力讨论。</span>
                </span>
              </label>
            </div>
          </div>
          <div class="two-col">
            <button id="cancel-create-chat" class="btn" type="button">取消</button>
            <button class="btn btn-primary" type="submit">创建</button>
          </div>
        </form>

        <div id="chat-list" class="chat-list"></div>
      </aside>

      <main class="panel workspace">
        <header class="chat-header">
          <div class="chat-title-block">
            <h2 id="chat-title" class="chat-title">未选择群聊</h2>
            <p id="chat-subtitle" class="chat-subtitle">创建或选择一个群聊开始协作</p>
          </div>
          <div class="chat-row">
            <button id="toggle-people-drawer" class="btn drawer-summary" type="button" aria-expanded="false">成员 0</button>
            <span id="chat-status" class="status-pill">空</span>
            <button id="restore-chat" class="btn" type="button">恢复会话</button>
          </div>
        </header>

        <section id="messages" class="messages" aria-live="polite"></section>

        <form id="composer" class="composer">
          <div id="reference-draft" class="reference-draft" hidden></div>
          <div id="mention-panel" class="mention-panel" hidden></div>
          <textarea id="message-input" placeholder="输入消息，@成员可指定回复；不 @ 默认发给全部成员。"></textarea>
          <div class="composer-actions">
            <div>
              <div id="target-preview" class="muted tiny">选择群聊后可发送</div>
              <div id="busy-preview" class="tiny"></div>
            </div>
            <button id="send-message" class="btn btn-primary" type="submit" disabled>发送</button>
          </div>
        </form>
      </main>

      <aside class="panel role-panel">
        <div class="panel-header">
          <div>
            <h2>群聊成员与人员</h2>
            <p id="role-summary" class="tiny">0 个人员</p>
          </div>
          <button id="open-gemini-login" class="icon-btn" type="button" aria-label="AI 站点登录">◇</button>
        </div>
        <div class="role-scroll">
          <div class="section-title">
            <h3>当前群聊人员</h3>
            <button id="close-people-drawer" class="btn" type="button">收起</button>
          </div>
          <div id="role-list" class="role-list"></div>

          <form id="add-role-form" class="editor-card role-form">
            <h3>添加人员</h3>
            <p class="tiny">从人员库批量选择，或临时添加只属于当前群聊的人员。</p>
            <select id="role-template-select" hidden></select>
            <button class="btn btn-primary" type="submit">打开添加人员</button>
          </form>

        </div>
      </aside>
    </div>
    <span id="template-summary" hidden></span>
    <div id="template-list" hidden></div>
    <button id="window-launcher" class="launcher" type="button" aria-label="打开 OpenTeam" hidden>⌁</button>

    <div id="people-library-modal" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="people-library-title">
        <div class="modal-header">
          <div>
            <h2 id="people-library-title">人员库</h2>
            <p class="tiny">维护可复用人员人设；加入群聊后会复制为独立人员。</p>
          </div>
          <div class="chat-row">
            <button id="new-template" class="btn btn-primary" type="button">新建</button>
            <button id="close-people-library" class="icon-btn" type="button" aria-label="关闭人员库">×</button>
          </div>
        </div>
        <div class="people-library-content">
          <div class="people-library-pane">
            <div class="section-title">
              <h3>人员列表</h3>
              <span id="people-library-summary" class="tiny">0 人</span>
            </div>
            <div id="people-library-list" class="template-list"></div>
          </div>
        </div>
      </section>
    </div>

    <div id="person-template-modal" class="modal-backdrop" hidden>
      <section class="modal template-editor-modal" role="dialog" aria-modal="true" aria-labelledby="template-form-title">
        <div class="modal-header">
          <div>
            <h2 id="template-form-title">新建人员</h2>
            <p class="tiny">维护人员名称、人设和默认站点。</p>
          </div>
          <button id="close-person-template" class="icon-btn" type="button" aria-label="关闭人员编辑">×</button>
        </div>
        <form id="people-library-form" class="modal-form">
          <div class="field">
            <label for="template-name">人员名称</label>
            <input id="template-name" type="text" maxlength="10" autocomplete="off" />
          </div>
          <div class="field">
            <label for="template-description">描述</label>
            <textarea id="template-description"></textarea>
          </div>
          <div class="field">
            <label for="template-prompt">人设</label>
            <textarea id="template-prompt"></textarea>
          </div>
          <div class="field">
            <label>默认站点</label>
            <div class="site-segmented">
              <label class="site-segment" for="template-site-gemini">
                <input id="template-site-gemini" type="radio" name="template-chat-site" value="gemini" checked />
                <span>Gemini</span>
              </label>
              <label class="site-segment" for="template-site-chatgpt">
                <input id="template-site-chatgpt" type="radio" name="template-chat-site" value="chatgpt" />
                <span>ChatGPT</span>
              </label>
              <label class="site-segment" for="template-site-claude">
                <input id="template-site-claude" type="radio" name="template-chat-site" value="claude" />
                <span>Claude</span>
              </label>
            </div>
          </div>
          <div class="template-actions">
            <button class="btn btn-primary" type="submit">保存人员</button>
          </div>
        </form>
      </section>
    </div>

    <div id="add-person-modal" class="modal-backdrop" hidden>
      <section class="modal" role="dialog" aria-modal="true" aria-labelledby="add-person-title">
        <div class="modal-header">
          <div>
            <h2 id="add-person-title">添加人员</h2>
            <p class="tiny">可从人员库批量添加，也可只为当前群聊临时添加。</p>
          </div>
          <button id="close-add-person" class="icon-btn" type="button" aria-label="关闭添加人员">×</button>
        </div>
        <div class="modal-grid">
          <div class="field modal-grid-wide site-picker">
            <label>站点</label>
            <div class="site-segmented">
              <label class="site-segment" for="add-person-site-gemini">
                <input id="add-person-site-gemini" type="radio" name="add-person-chat-site" value="gemini" checked />
                <span>Gemini</span>
              </label>
              <label class="site-segment" for="add-person-site-chatgpt">
                <input id="add-person-site-chatgpt" type="radio" name="add-person-chat-site" value="chatgpt" />
                <span>ChatGPT</span>
              </label>
              <label class="site-segment" for="add-person-site-claude">
                <input id="add-person-site-claude" type="radio" name="add-person-chat-site" value="claude" />
                <span>Claude</span>
              </label>
            </div>
          </div>
          <form id="add-library-people-form" class="modal-form modal-card">
            <h3>从人员库添加</h3>
            <div id="add-library-people-list" class="select-list"></div>
            <button class="btn btn-primary" type="submit">加入选中人员</button>
          </form>
          <form id="add-temporary-person-form" class="modal-form modal-card">
            <h3>临时添加</h3>
            <div class="field">
              <label for="temporary-person-name">人员名称</label>
              <input id="temporary-person-name" type="text" autocomplete="off" />
            </div>
            <div class="field">
              <label for="temporary-person-description">描述</label>
              <textarea id="temporary-person-description"></textarea>
            </div>
            <div class="field">
              <label for="temporary-person-prompt">人设</label>
              <textarea id="temporary-person-prompt"></textarea>
            </div>
            <button class="btn btn-primary" type="submit">仅加入当前群聊</button>
          </form>
        </div>
      </section>
    </div>

    <div id="iframe-host" class="iframe-host" aria-hidden="true"></div>
    <div id="error" class="toast" hidden></div>
    <script type="module" src="team.js"></script>
  </body>
</html>
